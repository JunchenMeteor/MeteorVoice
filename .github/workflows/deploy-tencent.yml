name: Deploy Tencent Docker

permissions:
  contents: read

on:
  pull_request:
    paths:
      - .dockerignore
      - Dockerfile
      - deploy/**
      - apps/web/next.config.ts
      - apps/web/app/api/health/**
      - package.json
      - package-lock.json
      - apps/web/package.json
      - packages/**
      - .github/workflows/deploy-tencent.yml
  push:
    branches:
      - main
      - release
  workflow_dispatch:

concurrency:
  group: deploy-tencent-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: meteorvoice-web

jobs:
  build:
    name: Build Web/API image
    runs-on: ubuntu-latest
    environment: tencent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=${{ runner.temp }}/meteorvoice-image.tar
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compress image artifact
        if: github.event_name != 'pull_request'
        run: gzip -1 < "${RUNNER_TEMP}/meteorvoice-image.tar" > deploy/meteorvoice-image.tar.gz

      - name: Upload image artifact to Tencent
        if: github.event_name != 'pull_request'
        env:
          DEPLOY_KEY: ${{ secrets.TENCENT_ARTIFACT_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.TENCENT_ARTIFACT_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ vars.TENCENT_ARTIFACT_HOST }}
          DEPLOY_USER: ${{ vars.TENCENT_ARTIFACT_USER }}
        run: |
          key_file="${RUNNER_TEMP}/artifact-upload-key"
          known_hosts_file="${RUNNER_TEMP}/artifact-known-hosts"
          printf '%s\n' "${DEPLOY_KEY}" > "${key_file}"
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > "${known_hosts_file}"
          chmod 0600 "${key_file}" "${known_hosts_file}"
          ssh -i "${key_file}" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${known_hosts_file}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "${GITHUB_SHA}" \
            < deploy/meteorvoice-image.tar.gz
          rm -f deploy/meteorvoice-image.tar.gz "${key_file}" "${known_hosts_file}"

      - name: Upload deployment manifest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: meteorvoice-deployment-${{ github.sha }}
          path: |
            deploy/docker-compose.yml
            deploy/deploy-container.sh
          retention-days: 7

  deploy:
    name: Deploy Web/API container
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: [self-hosted, linux, x64, tencent, meteorvoice]
    environment: tencent
    steps:
      - name: Download deployment manifest
        uses: actions/download-artifact@v4
        with:
          name: meteorvoice-deployment-${{ github.sha }}
          path: deployment

      - name: Resolve target
        id: target
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "release" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "port=3100" >> "$GITHUB_OUTPUT"
            echo "shadow_port=3110" >> "$GITHUB_OUTPUT"
            echo "pm2_name=meteorvoice-release" >> "$GITHUB_OUTPUT"
            echo "public_url=https://meteorvoice.jcmeteor.com/" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "port=3101" >> "$GITHUB_OUTPUT"
            echo "shadow_port=3111" >> "$GITHUB_OUTPUT"
            echo "pm2_name=meteorvoice" >> "$GITHUB_OUTPUT"
            echo "public_url=https://mv-pre.jcmeteor.com/" >> "$GITHUB_OUTPUT"
          fi

      - name: Load image artifact
        run: gzip -dc "/srv/deploy-inbox/meteorvoice/${GITHUB_SHA}.tar.gz" | docker load

      - name: Deploy
        env:
          APP_NAME: meteorvoice
          ENVIRONMENT: ${{ steps.target.outputs.environment }}
          HOST_PORT: ${{ steps.target.outputs.port }}
          IMAGE_URI: meteorvoice-web:${{ github.sha }}
          PM2_NAME: ${{ steps.target.outputs.pm2_name }}
          PUBLIC_URL: ${{ steps.target.outputs.public_url }}
          RUNTIME_ENV_FILE: /etc/meteorvoice/meteorvoice.env
          SHADOW_PORT: ${{ steps.target.outputs.shadow_port }}
        run: |
          chmod +x deployment/deploy-container.sh
          deployment/deploy-container.sh

      - name: Remove uploaded image artifact
        if: success()
        run: rm -f "/srv/deploy-inbox/meteorvoice/${GITHUB_SHA}.tar.gz"
