services:
  web:
    image: ${IMAGE_URI:?IMAGE_URI is required}
    init: true
    restart: unless-stopped
    env_file:
      - ${RUNTIME_ENV_FILE:?RUNTIME_ENV_FILE is required}
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    ports:
      - 127.0.0.1:${HOST_PORT:?HOST_PORT is required}:3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
